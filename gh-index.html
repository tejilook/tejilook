<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tejilook ERP</title>

  <!-- Redirección automática — el navegador lo permite desde HTTPS → HTTPS -->
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbzX6QbebHN7Fr_x5vT9Z65BMqTxOW7bafWVaMAMM9p8nGGB8ZRpHYxsSTM2Fj4eEU9p/exec">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',sans-serif;
      background:linear-gradient(135deg,#c026d3 0%,#7c3aed 40%,#ec4899 100%);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
    }
    .card{
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:20px;padding:48px 40px;
      text-align:center;color:#fff;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
      max-width:320px;width:90%;
    }
    .logo{
      width:64px;height:64px;
      background:linear-gradient(135deg,#7c3aed,#ec4899);
      border-radius:16px;display:flex;align-items:center;
      justify-content:center;margin:0 auto 20px;
      font-size:26px;font-weight:800;
    }
    h1{font-size:24px;font-weight:700;margin-bottom:6px}
    p{font-size:13px;opacity:0.65;margin-bottom:28px}
    .spinner{
      width:32px;height:32px;
      border:3px solid rgba(255,255,255,0.3);
      border-top-color:#fff;border-radius:50%;
      animation:spin .8s linear infinite;
      margin:0 auto 16px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .msg{font-size:13px;opacity:0.7;margin-bottom:20px}
    a.btn{
      display:block;padding:14px;
      background:linear-gradient(135deg,#1d4ed8,#3b82f6);
      border-radius:50px;color:#fff;
      font-size:15px;font-weight:700;
      text-decoration:none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">TJ</div>
    <h1>Tejilook ERP</h1>
    <p>Sistema de Control de Producción Textil</p>
    <div class="spinner"></div>
    <div class="msg">Abriendo sistema...</div>
    <a class="btn" href="https://script.google.com/macros/s/AKfycbzX6QbebHN7Fr_x5vT9Z65BMqTxOW7bafWVaMAMM9p8nGGB8ZRpHYxsSTM2Fj4eEU9p/exec">
      Abrir manualmente
    </a>
  </div>
</body>
</html>
